<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Nexora · Secure Access</title>
    <!-- Google Fonts: clean modern sans -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f5f7fc 0%, #eef2f9 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      /* main card container */
      .login-container {
        max-width: 460px;
        width: 100%;
        background: #ffffff;
        border-radius: 2rem;
        box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 8px 18px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        transition: transform 0.2s ease;
      }
      
      .login-container:hover {
        transform: translateY(-4px);
      }
      
      /* header area with brand & SVG logo */
      .brand-header {
        padding: 2rem 2rem 1rem 2rem;
        text-align: center;
        background: #ffffff;
      }
      
      .svg-logo {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 1.2rem;
      }
      
      .company-name {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(120deg, #1e2a5e, #2e4a8e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-top: 0.25rem;
      }
      
      .tagline {
        font-size: 0.85rem;
        color: #5b6e8c;
        font-weight: 500;
        margin-top: 0.4rem;
        letter-spacing: 0.2px;
      }
      
      /* form area */
      .form-wrapper {
        padding: 0.5rem 2rem 2rem 2rem;
      }
      
      .input-group {
        margin-bottom: 1.5rem;
        position: relative;
      }
      
      .input-group i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #8f9bb3;
        font-size: 1.1rem;
        transition: color 0.2s;
        pointer-events: none;
      }
      
      .input-group input {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.8rem;
        font-size: 0.95rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        border: 1.5px solid #e2e8f0;
        border-radius: 1.2rem;
        background-color: #fefefe;
        transition: all 0.25s;
        outline: none;
        color: #1e293b;
      }
      
      .input-group input:focus {
        border-color: #2e4a8e;
        box-shadow: 0 0 0 3px rgba(46, 74, 142, 0.15);
        background-color: #ffffff;
      }
      
      .input-group input:focus + i {
        color: #2e4a8e;
      }
      
      /* options row: forgot */
      .options-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.8rem;
        font-size: 0.85rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      
      .forgot-link {
        color: #4f6f9f;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      
      .forgot-link:hover {
        color: #1e2a5e;
        text-decoration: underline;
      }
      
      /* login button */
      .login-btn {
        width: 100%;
        background: linear-gradient(98deg, #1e2a5e, #2e4a8e);
        border: none;
        padding: 0.9rem;
        font-size: 1rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        color: white;
        border-radius: 1.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s ease;
        box-shadow: 0 8px 18px rgba(30, 42, 94, 0.2);
        letter-spacing: 0.3px;
      }
      
      .login-btn i,
      .create-link i {
        font-size: 1rem;
        transition: transform 0.2s;
      }
      
      .login-btn:hover {
        background: linear-gradient(98deg, #15234e, #233d77);
        transform: scale(1.01);
        box-shadow: 0 10px 22px rgba(30, 42, 94, 0.3);
      }
      
      .login-btn:hover i .create-link i {
        transform: translateX(4px);
      }
      
      /* divider */
      .divider {
        margin: 2rem 0 1.2rem;
        display: flex;
        align-items: center;
        text-align: center;
        color: #8b9ab0;
        font-size: 0.75rem;
        font-weight: 500;
      }
      
      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e4e9f2;
      }
      
      .divider span {
        margin: 0 12px;
      }
      
      .create-link {
        width: 100%;
        background: linear-gradient(98deg, #1e2a5e, #2e4a8e);
        border: none;
        padding: 0.9rem;
        font-size: 1rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        color: white;
        border-radius: 1.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s ease;
        box-shadow: 0 8px 18px rgba(30, 42, 94, 0.2);
        letter-spacing: 0.3px;
      }
      
      .create-link:hover {
        transform: translateX(4px);
      }
      
      /* demo hint (subtle) */
      .demo-note {
        text-align: center;
        font-size: 0.7rem;
        color: #8c9bb0;
        background: #f8fafd;
        margin-top: 1.5rem;
        padding: 0.65rem;
        border-radius: 2rem;
        font-weight: 500;
      }
      
      .demo-note i {
        margin-right: 5px;
        font-size: 0.7rem;
      }
      
      /* responsiveness */
      @media (max-width: 500px) {
        .login-container {
          border-radius: 1.5rem;
        }
      
        .form-wrapper {
          padding: 0.5rem 1.5rem 1.8rem 1.5rem;
        }
      
        .brand-header {
          padding: 1.5rem 1.5rem 0.5rem 1.5rem;
        }
      
        .options-row {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="brand-header">
        <div class="svg-logo">
          <!-- Professional SVG logo: abstract tech node / circuit-inspired mark -->
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="56" height="56" rx="16" fill="url(#gradBg)" />
            <path d="M28 14L38 20V32L28 38L18 32V20L28 14Z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(255,255,255,0.12)" />
            <path d="M28 26L33 29V35L28 38L23 35V29L28 26Z" fill="white" fill-opacity="0.95" stroke="white" stroke-width="1.2" />
            <circle cx="28" cy="26" r="2" fill="#1E2A5E" stroke="white" stroke-width="1" />
            <path d="M18 20L28 26L38 20" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M28 38V44" stroke="white" stroke-width="1.6" stroke-linecap="round" />
            <circle cx="28" cy="47" r="2.2" fill="white" stroke="#1E2A5E" stroke-width="1.2" />
            <defs>
              <linearGradient id="gradBg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2E4A8E" />
                <stop offset="1" stop-color="#1E2A5E" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="company-name">NEXORA</div>
        <div class="tagline">secure identity · next‑gen platform</div>
      </div>

      <div class="form-wrapper">
        <form id="loginForm" action="{{ url_for('login.login') }}" method="POST">
          <div class="input-group">
            <i class="fas fa-user-circle"></i>
            <input type="text" id="username" name="username" placeholder="Work email or username" autocomplete="username" required />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required />
          </div>
          <div class="options-row">
            <a href="#" class="forgot-link" id="forgotTrigger"><i class="fas fa-key"></i> Forgot password?</a>
          </div>
          <button type="submit" class="login-btn" id="signInBtn"><span>Sign in</span> <i class="fas fa-arrow-right"></i></button>
          <div class="divider">
            <span>secure enterprise SSO</span>
          </div>
          <a href="{{ url_for('signup.signup') }}" class="create-link"><i class="fas fa-user-plus"></i> Create account</a>
          {% if error %}
            <div class="demo-note" style="background:#fff1f2;color:#be123c;">
              <i class="fas fa-circle-exclamation"></i> {{ error }}
            </div>
          {% endif %}
          <div class="demo-note">
            <i class="fas fa-terminal"></i> Demo: credentials will be logged to console (no storage)
          </div>
        </form>
      </div>
    </div>

    <script>
      ;(function () {
        const forgotLink = document.getElementById('forgotTrigger')
      
        forgotLink.addEventListener('click', (e) => {
          e.preventDefault()
          console.log('[PASSWORD RESET] recovery link requested — demo flow (no backend)')
          const link = forgotLink
          link.style.opacity = '0.7'
          setTimeout(() => {
            link.style.opacity = '1'
          }, 200)
        })
      })()
    </script>
  </body>
</html>
