<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="subtext">Register to unlock dashboard analysis views.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" autocomplete="off" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="10">

        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <p class="switch">Already have an account? <a href="{{ url_for('login.login') }}">Login</a></p>
    </section>
  </main>
</body>
</html>
